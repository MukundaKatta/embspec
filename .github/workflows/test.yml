name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=embspec \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: build sanity check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build sdist + wheel
        run: uv build
      - name: Install built wheel into a clean env and import
        run: |
          uv venv /tmp/install-test
          /tmp/install-test/bin/pip install dist/*.whl
          /tmp/install-test/bin/python -c "from embspec import IndexManifest, EmbeddingSpec, DriftAdapter, neighbor_stability, embed_assert, __version__; print('import ok, v', __version__)"
